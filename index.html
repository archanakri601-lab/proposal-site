<!DOCTYPE html>
<html>
<head>
<title>Proposal 💖</title>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#ffeef2;
font-family:Arial;
overflow:hidden;
}

h1{
color:#ff4d88;
font-size:40px;
}

button{
padding:12px 25px;
font-size:20px;
border:none;
border-radius:30px;
margin:10px;
cursor:pointer;
}

#yes{
background:#ff4d88;
color:white;
}

#no{
background:#cfd8dc;
}

</style>
</head>

<body>

<h1>Will you be my enemy? 💍</h1>

<div>
<button id="yes">Yes</button>
<button id="no">No</button>
</div>

<script>

const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {

const x = Math.random() * (window.innerWidth - 100);
const y = Math.random() * (window.innerHeight - 100);

noBtn.style.position = "absolute";
noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

});

document.getElementById("yes").onclick = () => {

document.body.innerHTML = `

<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#fff0f5;
">

<h1 style="color:#ff4d88">
I hate you ❤️
</h1>

<img src="https://media.tenor.com/g3zkZaRZ3YQAAAAM/enemy-enemy-spotted.gif" width="250">

</div>

`;

};

</script>

</body>
</html>
