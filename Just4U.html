<!DOCTYPE html>
<html>

<head>
    <title>Only For You ❤️</title>

    <style>
        body{
            background:#ffe6f0;
            overflow:hidden;
            text-align:center;
            font-family:Arial;
        }

        h1{
            margin-top:120px;
            color:#ff3385;
            font-size:55px;
        }

        #yes{
            background:#ff3385;
            color:white;
            border:none;
            padding:15px 35px;
            border-radius:40px;
            font-size:22px;
            cursor:pointer;
            margin:20px;
        }

        #no{
            position:absolute;
            background:#444;
            color:white;
            border:none;
            padding:15px 35px;
            border-radius:40px;
            font-size:22px;
            cursor:pointer;
        }

        img{
            width:250px;
            border-radius:20px;
            margin-top:40px;
        }
    </style>
</head>

<body>

    <img src="https://media.tenor.com/dKYs1y0qWeAAAAAM/cute-cat.gif">

    <h1>Will You Stay Forever? ❤️</h1>

    <button id="yes" onclick="love()">Yes 💖</button>

    <button id="no" onmouseover="run()">No 😭</button>

<script>

function love(){
    alert("Yayyyyy ❤️🥹");
}

function run(){

    let x=Math.random()*1000;
    let y=Math.random()*500;

    document.getElementById("no").style.left=x+"px";
    document.getElementById("no").style.top=y+"px";
}

</script>

</body>
</html>
