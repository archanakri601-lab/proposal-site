<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Only For You ❤️</title>

<style>

body{
    margin:0;
    padding:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#fff0f5;
    text-align:center;
}

/* MAIN PAGE */

.main{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

h1{
    color:#ff2e7a;
    font-size:55px;
    margin-bottom:10px;
}

p{
    font-size:22px;
    color:#444;
    line-height:35px;
}

img{
    width:280px;
    border-radius:20px;
    margin-top:20px;
}

.buttons{
    margin-top:35px;
}

button{
    padding:15px 35px;
    font-size:22px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    margin:15px;
    transition:0.3s;
}

#yes{
    background:#ff2e7a;
    color:white;
}

#yes:hover{
    transform:scale(1.1);
}

#no{
    background:black;
    color:white;
}

/* HEARTS */

.heart{
    position:fixed;
    top:-20px;
    color:red;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{
        transform:translateY(-10vh);
    }

    100%{
        transform:translateY(110vh);
    }
}

</style>
</head>

<body>

<div class="main">

<h1>Will You Be Mine Forever? ❤️</h1>

<p>
I don't need perfect moments ❤️<br>
I just need you beside me 🥺
</p>

<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

<div class="buttons">

<button id="yes" onclick="yesPage()">Yes ❤️</button>

<button id="no" onclick="noPage()">No 💔</button>

</div>

</div>

<script>

/* YES PAGE */

function yesPage(){

document.body.innerHTML=`

<div style="
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#fff0f5;
text-align:center;
padding:20px;
">

<img 
src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif"
style="
width:320px;
border-radius:25px;
box-shadow:0 0 25px pink;
"
>

<h1 style="
color:#ff2e7a;
font-size:55px;
margin-top:25px;
">
I Knew You Would Accept ❤️
</h1>

<p style="
font-size:28px;
color:#444;
line-height:45px;
">
Now you are officially mine forever 🥺💍<br>
You just made my life beautiful ❤️
</p>

<h2 style="
color:#ff2e7a;
margin-top:20px;
">
Forever Starts Here ✨
</h2>

</div>

`;

createHearts();

}

/* NO PAGE */

function noPage(){

let messages=[
"Think Again 🥺",
"Please Don't Break My Heart 💔",
"You Hurt My Heart 😭",
"I'll Wait Forever ❤️",
"Please One Chance 🥺",
"Nooooo 😭",
"My Heart Is Crying 💔",
"Why So Mean 😭❤️",
"I Already Imagined Our Future 🥺",
"Please Say Yes ❤️"
];

let randomMessage=messages[Math.floor(Math.random()*messages.length)];

document.body.innerHTML=`

<div style="
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
text-align:center;
padding:20px;
">

<img 
src="https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif"
style="
width:300px;
border-radius:20px;
"
>

<h1 style="
color:red;
font-size:50px;
margin-top:25px;
">
${randomMessage}
</h1>

<p style="
font-size:28px;
color:white;
line-height:45px;
">
You really broke my heart 💔😭
</p>

<button onclick="location.reload()" style="
padding:15px 35px;
font-size:22px;
border:none;
border-radius:40px;
background:#ff2e7a;
color:white;
margin-top:30px;
cursor:pointer;
">
Come Back ❤️
</button>

</div>

`;

}

/* HEART ANIMATION */

function createHearts(){

for(let i=0;i<80;i++){

let heart=document.createElement("div");

heart.innerHTML="💖";

heart.classList.add("heart");

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*30+15)+"px";

heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

}

}

createHearts();

</script>

</body>
</html>
