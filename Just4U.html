<!DOCTYPE html>
<html>

<head>
    <title>Only For You ❤️</title>

    <style>
        body{
            margin:0;
            padding:0;
            overflow:hidden;
            background:#fff0f5;
            font-family:Arial, sans-serif;
            text-align:center;
        }

        h1{
            margin-top:80px;
            color:#ff3b85;
            font-size:55px;
        }

        p{
            color:#444;
            font-size:22px;
        }

        img{
            width:260px;
            border-radius:20px;
            margin-top:20px;
        }

        .buttons{
            margin-top:40px;
        }

        button{
            padding:15px 35px;
            font-size:22px;
            border:none;
            border-radius:40px;
            cursor:pointer;
            margin:20px;
            transition:0.3s;
        }

        #yes{
            background:#ff3b85;
            color:white;
        }

        #yes:hover{
            transform:scale(1.1);
        }

        #no{
            background:black;
            color:white;
            position:absolute;
        }

        .heart{
            position:fixed;
            color:red;
            animation:fall 5s linear infinite;
            top:-10px;
        }

        @keyframes fall{
            0%{
                transform:translateY(-10px);
            }
            100%{
                transform:translateY(110vh);
            }
        }
    </style>
</head>

<body>

    <h1>Will You Be Mine Forever? ❤️</h1>

    <p>
        I don’t need perfect moments,<br>
        I just need you beside me 🥺❤️
    </p>

    <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

    <div class="buttons">
        <button id="yes" onclick="love()">Yes ❤️</button>

        <button id="no" onmouseover="run()">No 💔</button>
    </div>

<script>

function love(){

document.body.innerHTML = `

<div style="
height:100vh;
background:#fff0f5;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial;
text-align:center;
overflow:hidden;
">

<img 
src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif"
width="320"
style="
border-radius:25px;
box-shadow:0 0 25px pink;
"
>

<h1 style="
color:#ff3b85;
font-size:60px;
margin-top:30px;
">
I knew you would accept it ❤️
</h1>

<p style="
font-size:28px;
color:#444;
line-height:45px;
margin-top:15px;
">
Now you are officially mine forever 🥹💍 <br>
You just made my life beautiful ❤️
</p>

<h2 style="
margin-top:25px;
color:#ff3b85;
">
Forever Starts Here ✨
</h2>

</div>

`;

for(let i=0; i<120; i++){

    let heart=document.createElement("div");

    heart.innerHTML="💖";

    heart.style.position="fixed";
    heart.style.left=Math.random()*100+"vw";
    heart.style.top="-20px";
    heart.style.fontSize=(Math.random()*35+15)+"px";
    heart.style.animation="fall 4s linear infinite";

    document.body.appendChild(heart);
}

}

function run(){

    let texts=[
        "Think again 🥺",
        "Please don't break my heart 💔",
        "Nooooo 😭",
        "Give me one chance ❤️",
        "I’ll keep annoying you forever 😭",
        "You are too cute to say no 🥹",
        "My heart is crying 💔",
        "Pleaseeeee 😭❤️",
        "Are you really sure? 🥺",
        "I already imagined our future 😭"
    ];

    let randomText=texts[Math.floor(Math.random()*texts.length)];

    document.getElementById("no").innerHTML=randomText;

    let x=Math.random()*1000;
    let y=Math.random()*500;

    document.getElementById("no").style.left=x+"px";
    document.getElementById("no").style.top=y+"px";
}

for(let i=0;i<30;i++){

    let heart=document.createElement("div");

    heart.innerHTML="💖";

    heart.classList.add("heart");

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=(Math.random()*25+10)+"px";

    heart.style.animationDuration=(Math.random()*3+2)+"s";

    document.body.appendChild(heart);
}

</script>

</body>
</html>
